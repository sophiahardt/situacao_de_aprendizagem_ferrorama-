<body>
    <div class="painel-esquerdo">
        <h2 id="titulo">Login</h2>

        <form id="form-login">
            <div id="c-email" class="conjunto">
                <label for="usuario">Usuário:</label>
                <input type="text" class="form-control" id="usuario" placeholder="Informe seu nome de usuário" required>
            </div>
            <div id="c-senha" class="conjunto">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" class="form-control" placeholder="Informe sua senha" required>
            </div>
            <br>
            <button id="botao-envio" type="submit" class="btn btn-success mt-3">Entrar</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
