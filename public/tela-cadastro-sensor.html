<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Sensor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #003399;">
        <div class="container-fluid">

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Sensores</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Trens</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Rotas</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Funcionários</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Relatórios</a></li>
                </ul>

                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            Admin João
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Sair</a></li>
                        </ul>
                    </li>
                </ul>
            </div>

        </div>
    </nav>

    <div class="container mt-5">

        <div class="card">
            <div class="card-body">

                <h2 class="text-center mb-3">Cadastrar novo sensor</h2>
                <p class="text-center text-muted">
                    Preencha as informações para cadastrar um novo sensor no sistema
                </p>

                <hr>

                <form>

                    <div class="mb-3 col-md-5">
                        <label class="form-label">ID do Sensor</label>
                        <input type="text" class="form-control" placeholder="Informe o ID do sensor">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nome do Sensor</label>
                        <input type="text" class="form-control" placeholder="Informe o nome do sensor">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tipo de Sensor</label>
                        <select class="form-select">
                            <option selected disabled>Selecione o tipo de dado coletado</option>
                            <option>Temperatura</option>
                            <option>Velocidade</option>
                            <option>Falha</option>
                        </select>
                    </div>
                    
                    </form>
                <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
